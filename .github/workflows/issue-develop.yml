name: Issue Development

on:
  issues:
    types: [labeled]

jobs:
  develop:
    if: github.event.label.name == 'approved' && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create feature branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="issue-${ISSUE_NUMBER}"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Collect issue context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          COMMENTS=$(gh issue view "$ISSUE_NUMBER" --comments --json comments --jq '.comments[].body' 2>/dev/null || echo "")
          EOF_MARKER="GHEOF_$(date +%s)"
          {
            echo "comments<<${EOF_MARKER}"
            echo "$COMMENTS"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_COMMENTS: ${{ steps.context.outputs.comments }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue_number }}
        run: |
          cat <<PROMPT | npx -y @anthropic-ai/claude-code -p --model claude-sonnet-4-20250514 --allowedTools "Edit,Write,Read,Glob,Grep,Bash(npm run build)"
          你是開發 agent。請根據以下 Issue 和討論內容，在當前 branch 上實作功能。

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          討論紀錄：
          ${ISSUE_COMMENTS}

          規則：
          1. 先閱讀 CLAUDE.md 了解專案慣例
          2. 閱讀相關程式碼後再修改
          3. 完成後執行 npm run build 確認建置成功
          4. 用繁體中文撰寫 commit message
          PROMPT

      - name: Push changes
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: implement issue #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"

      - name: Build preview
        run: npm run build
        env:
          VITE_BASE: /todo/preview/${{ steps.branch.outputs.branch }}/

      - name: Deploy preview to gh-pages
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          PREVIEW_DIR="preview/${BRANCH}"

          mkdir -p /tmp/preview-build
          cp -r dist/* /tmp/preview-build/

          if git fetch origin gh-pages 2>/dev/null; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          rm -rf "$PREVIEW_DIR"
          mkdir -p "$PREVIEW_DIR"
          cp -r /tmp/preview-build/* "$PREVIEW_DIR/"

          git add -A
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "preview: deploy ${BRANCH}"
            git push origin gh-pages
          }

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create PR and comment on issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue_number }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          PR_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          REPO_NAME="${REPO#*/}"
          PREVIEW_URL="https://${OWNER}.github.io/${REPO_NAME}/preview/${BRANCH}/"

          # Switch back to feature branch for gh commands
          git checkout "$BRANCH" 2>/dev/null || true

          PR_URL=$(gh pr create \
            --title "feat: ${PR_TITLE}" \
            --body "$(cat <<EOF
          ## Summary

          Implements #${ISSUE_NUMBER}

          Closes #${ISSUE_NUMBER}

          ## Preview

          ${PREVIEW_URL}

          ---
          🤖 Auto-generated by Claude Code
          EOF
          )" \
            --head "$BRANCH" \
            --base main)

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          🚀 **PR 已建立：** ${PR_URL}
          🔍 **預覽連結：** ${PREVIEW_URL}
          EOF
          )"

      - name: Update labels
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "approved" \
            --add-label "in-progress"

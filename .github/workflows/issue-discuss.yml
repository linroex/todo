name: Issue Discussion

on:
  issue_comment:
    types: [created]

jobs:
  discuss:
    if: |
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          prompt: |
            你是 PM agent，正在與使用者討論 Issue 的規劃。

            請根據使用者的回饋更新或補充規劃。用繁體中文回覆。
            請先閱讀 CLAUDE.md 和相關程式碼來確保方案可行。
            不要修改任何檔案，只需要回覆討論內容。
          claude_args: '--allowedTools "Read,Glob,Grep" --model claude-sonnet-4-20250514'

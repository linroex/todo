name: Issue Discussion

on:
  issue_comment:
    types: [created]

jobs:
  discuss:
    if: |
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect comment history
        id: history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue view "$ISSUE_NUMBER" --comments --json comments \
            --jq '[.comments[] | "**" + .author.login + "**: " + .body] | join("\n\n---\n\n")' \
            > /tmp/comment-history.txt 2>/dev/null || echo "" > /tmp/comment-history.txt

      - name: Generate response
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LATEST_COMMENT: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_COMMENTS=$(cat /tmp/comment-history.txt)
          cat <<PROMPT | npx -y @anthropic-ai/claude-code -p --model claude-sonnet-4-20250514 --allowedTools "Read,Glob,Grep" > /tmp/response-result.md
          你是 PM agent，正在與使用者討論 Issue 的規劃。

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          完整討論紀錄：
          ${ISSUE_COMMENTS}

          使用者最新的 comment：
          ${LATEST_COMMENT}

          請根據使用者的回饋更新或補充規劃。用繁體中文回覆。
          請先閱讀 CLAUDE.md 和相關程式碼來確保方案可行。
          不要修改任何檔案，只需要回覆討論內容。
          PROMPT

      - name: Post response to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/response-result.md

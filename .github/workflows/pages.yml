name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '.claude/**'
      - 'CLAUDE.md'
      - 'README.md'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /todo/

      - name: Update gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/main-build
          cp -r dist/* /tmp/main-build/

          # Checkout or create gh-pages branch
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Replace root files, preserve preview/
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'preview' -exec rm -rf {} +
          cp -r /tmp/main-build/* .

          git add -A
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "deploy: update main site"
            git push origin gh-pages
          }

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4

name: Build and Upload Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /todo/

      - name: Package build output
        run: cd dist && zip -r ../todo-${{ github.event.release.tag_name }}.zip .

      - name: Upload to release
        run: gh release upload ${{ github.event.release.tag_name }} todo-${{ github.event.release.tag_name }}.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
